slug: sql-connection
name: SQL connection flags
Description: |
  PostgreSQL connection settings for the Draft Review application database.
flags:
  - name: host
    type: string
    help: Database host
    default: ""
  - name: port
    type: int
    help: Database port
    default: 5432
  - name: database
    type: string
    help: Database name
    default: ""
  - name: user
    type: string
    help: Database user
    default: ""
  - name: password
    type: string
    help: Database password
    default: ""
  - name: schema
    type: string
    help: Database schema (search_path) when applicable
    default: public
  - name: db-type
    type: string
    help: Database type (pgx for PostgreSQL)
    default: pgx
  - name: dsn
    type: string
    help: Full PostgreSQL DSN
    default: ""
  - name: driver
    type: string
    help: Database driver
    default: pgx
  - name: ssl-disable
    type: bool
    help: Disable SSL/TLS when connecting locally
    default: true
